<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AutoGo</title>
<link href="icon.svg" rel="icon" type="image/x-icon"/>
<!-- 解除其他平台的防盗链 -->
<meta content="never" name="referrer"/>
<meta content="IE=edge,chrome=1" http-equiv="X-UA-Compatible">
<meta content="Description" name="description"/>
<meta content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" name="viewport"/>
<link href="style/vue.css" rel="stylesheet"/>
<link href="style/myStyle.css" rel="stylesheet" type="text/css">
<style>
    .cover {
      background: linear-gradient(to left bottom, hsl(216, 100%, 85%) 0%, hsl(107, 100%, 85%) 100%) !important;
    }
  </style>
</link></meta></head>
<body>
<div id="app">Loading...</div>
<a class="to-top">Top</a>
<script>
    window.$docsify = {
      el: '#app',
      name: 'AutoGo',
      repo: 'https://github.com/Dasongzi1366/AutoGo',
      coverpage: true,  //开启封面
      loadSidebar: true,//开启侧边栏
      auto2top: true,   //切换页面自动回到顶部
      subMaxLevel: 2,   //目录最大级数
      maxLevel: 4,      //可配置最大支持渲染的标题层级
      homepage: 'README.md', //设置README.md作为首页

      alias: {
        '/API/_sidebar.md': '/_sidebar.md'
      },
      
      //添加搜索功能，中文和英文文档同时搜索
      search: {
        paths: 'auto',
        placeholder: {
          '/':'🔍 搜索'
        },
        //如果中文和英文文档都没有内容，则返回
        noData: {
          '/':'😒 找不到结果',
        },
  
        depth: 4,         //搜索标题的最大层级
        maxAge: 86400000, // 过期时间，单位毫秒，默认一天
      },//增加搜索框

      footer: {
        copy: '<span><a href="https://beian.miit.gov.cn/" target="_blank">皖ICP备2025075453号</a></span>',
        auth: ' <strong>-AutoGo-</strong>',
        pre: '<hr/>',
        style: 'text-align: center;',
      },

      copyCode: {
          buttonText: 'Copy',
          errorText: 'Error',
          successText: 'OK!'
      },

      'flexible-alerts': {
        style: 'flat'
      }

    }
  </script>
<script src="docsify@4"></script>
<!-- 复制代码到剪切板 -->
<script src="docsify-copy-code"></script>
<!-- 搜索功能 -->
<script src="search.min.js"></script>
<!-- Go语法高亮 -->
<script src="prism-go.min.js"></script>
<!-- 文档页脚增强 -->
<script src="docsify-footer.min.js"></script>
<!-- PWA 离线化 -->
<script>
    // Service Worker 已禁用（本地运行不需要）
  </script>
<!-- 置顶插件 -->
<script src="style/jquery-1.11.3.min.js"></script>
<script src="style/jquery.toTop.min.js"></script>
<script>
    $('.to-top').toTop();
  </script>
<!-- Markdown 引用样式美化 -->
<script src="docsify-plugin-flexible-alerts.min.js"></script>
<!-- 图片缩放 -->
<script src="zoom-image.js"></script>
</body>
</html>
